dataset: "CaSSeD"
src_image_pattern: "CaSSeD/CaSSed_Dataset/Real_World_data/**/raw_images/*.png"
src_gt_mask_pattern: "CaSSeD/CaSSed_Dataset/Real_World_data/**/annotations/*.png"
exclude_patterns:  
  - "CaSSeD/CaSSed_Dataset/Real_World_data/Test/*"
  - "CaSSeD/CaSSed_Dataset/Real_World_data/Train/*"
dst_image_dir: "AORAS/TerrainSeg/CaSSeD/CaSSeD/images"
dst_gt_mask_dir: "AORAS/TerrainSeg/CaSSeD/CaSSeD/gt_masks"
filename_mapping:
  "image": "rgb"
  "screenshot_": ""
overwrite_existing: false
color_thresh: 3
label_to_id_mapping:
  "[155, 155, 155]":  1   # Smooth Trail     -> road
  "[139, 87, 42]":    1   # Rough Trail      -> road
  "[209, 255, 158]":  2   # Small Vegetation -> vegetation
  "[59, 93, 4]":      0   # Forest           -> background
  "[184, 20, 124]":   0   # Obstacle         -> background
  "[74, 144, 226]":   0   # Sky              -> background