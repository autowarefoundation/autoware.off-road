dataset: "OFFSED"
src_image_pattern: "OFFSED/left/*.png"
src_gt_mask_pattern: "OFFSED/devkit_offsed/SegmentationClass/*.png"
exclude_patterns: []
dst_image_dir: "AORAS/TerrainSeg/OFFSED/OFFSED/images"
dst_gt_mask_dir: "AORAS/TerrainSeg/OFFSED/OFFSED/gt_masks"
filename_mapping: {}
overwrite_existing: false
color_thresh: 3
label_to_id_mapping:
  "[0, 0, 0]":       0   # background           -> background
  "[70, 70, 70]":    0   # building             -> background
  "[99, 128, 52]":   0   # bush                 -> background
  "[0, 0, 90]":      0   # camper               -> background
  "[0, 0, 142]":     0   # car                  -> background
  "[184, 151, 51]":  0   # crops                -> background
  "[81, 0, 81]":     1   # drivable dirt        -> road
  "[128, 64, 128]":  1   # drivable pavement    -> road
  "[0, 60, 100]":    0   # excavator            -> background
  "[24, 226, 31]":   2   # grass                -> vegetation
  "[180, 165, 180]": 0   # guard rail           -> background
  "[44, 231, 215]":  0   # held_object          -> background
  "[175, 44, 190]":  1   # nondrivable dirt     -> road
  "[244, 35, 232]":  1   # nondrivable pavement -> road
  "[255, 0, 0]":     0   # obstacle             -> background
  "[209, 43, 77]":   0   # person               -> background
  "[70, 130, 180]":  0   # sky                  -> background
  "[107, 142, 35]":  0   # tree                 -> background
  "[0, 0, 70]":      0   # truck                -> background
  "[102, 102, 156]": 0   # wall                 -> background